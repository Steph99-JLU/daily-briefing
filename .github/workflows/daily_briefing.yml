name: Daily Briefing

on:
  schedule:
    # 06:30 UTC = 07:30 CET (UTC+1 winter) / 08:30 CEST (UTC+2 summer)
    # Change to "30 5 * * 1-5" in summer if you want exactly 07:30 CEST
    - cron: "30 6 * * 1-5"
  workflow_dispatch:
    inputs:
      debug:
        description: "Set to 'true' to print raw Gemini output"
        required: false
        default: "false"

permissions:
  contents: write   # needed to commit docs/index.html

jobs:
  generate:
    name: Generate & Deliver Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing generator
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:        ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:      ${{ secrets.RECIPIENT_EMAIL }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          ARCHIVE_DIR:          archive
        run: python briefing.py

      - name: Commit & push docs/index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git add archive/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "briefing: $(date -u +%Y-%m-%d)"
          git push
